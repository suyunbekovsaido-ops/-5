<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Maze Final Code-Only Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; color: #0f0; }
        #lobby { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 100; }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 10px; border: 1px solid #0f0; }
        .menu { border: 1px solid #0f0; padding: 20px; text-align: center; }
        button { padding: 10px 20px; background: #0f0; color: #000; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; }
        input { background: #000; color: #0f0; border: 1px solid #0f0; padding: 10px; }
    </style>
</head>
<body>
    <div id="lobby">
        <div class="menu">
            <h2>NETWORK TUNNEL</h2>
            <input type="text" id="room" placeholder="КОД КОМНАТЫ"><br>
            <button onclick="start(true)">HOST</button>
            <button onclick="start(false)">JOIN</button>
        </div>
    </div>
    <div id="ui">
        СВЯЗЬ: <span id="status">НЕТ</span><br>
        ПАКЕТЫ: <span id="pkts">0</span>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/PointerLockControls.js"></script>

    <script>
        let scene, camera, renderer, controls, peer, conn;
        let other = null;
        let pCount = 0;

        function start(isHost) {
            const code = document.getElementById('room').value;
            document.getElementById('lobby').style.display = 'none';

            // ТРЮК №1: Используем больше STUN-серверов для "пробития" порта
            const config = {
                'iceServers': [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' },
                    { urls: 'stun:stun3.l.google.com:19302' },
                    { urls: 'stun:stun4.l.google.com:19302' }
                ]
            };

            peer = new Peer(isHost ? code : "cl_" + Math.random().toString(36).substr(2,5), { config });

            peer.on('open', () => {
                if(!isHost) {
                    // ТРЮК №2: Используем надежный канал (TCP-like) вместо быстрого (UDP)
                    // Это медленнее, но брандмауэры реже блокируют TCP
                    conn = peer.connect(code, { reliable: true });
                    setupConnection();
                }
            });

            peer.on('connection', (c) => {
                conn = c;
                setupConnection();
            });

            init3D();
        }

        function setupConnection() {
            conn.on('open', () => {
                document.getElementById('status').innerText = "OK";
                
                // ТРЮК №3: "Дребезжащая" отправка
                // Если слать слишком часто, Windows сочтет это за атаку. 
                // Сделаем задержку чуть больше — 60мс (16 раз в секунду)
                setInterval(() => {
                    if(conn && conn.open) {
                        // Шлем строкой, чтобы избежать ошибок парсинга объектов
                        conn.send(`${camera.position.x}|${camera.position.z}`);
                    }
                }, 60);
            });

            conn.on('data', (data) => {
                pCount++;
                document.getElementById('pkts').innerText = pCount;

                // Разбираем строку обратно в числа
                const parts = data.split('|');
                const x = parseFloat(parts[0]);
                const z = parseFloat(parts[1]);

                if(!other) {
                    other = new THREE.Mesh(
                        new THREE.BoxGeometry(0.8, 0.8, 0.8),
                        new THREE.MeshBasicMaterial({ color: 0xff0000 })
                    );
                    scene.add(other);
                }
                other.position.set(x, 0.4, z);
            });
        }

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            controls = new THREE.PointerLockControls(camera, document.body);
            document.body.addEventListener('click', () => controls.lock());
            scene.add(new THREE.GridHelper(100, 50, 0x00ff00, 0x222222));
            camera.position.set(0, 1.6, 5);
            
            const keys = {};
            window.onkeydown = (e) => keys[e.code] = true;
            window.onkeyup = (e) => keys[e.code] = false;

            function loop() {
                requestAnimationFrame(loop);
                if(controls.isLocked) {
                    if(keys['KeyW']) controls.moveForward(0.1);
                    if(keys['KeyS']) controls.moveForward(-0.1);
                    if(keys['KeyA']) controls.moveRight(-0.1);
                    if(keys['KeyD']) controls.moveRight(0.1);
                }
                renderer.render(scene, camera);
            }
            loop();
        }
    </script>
</body>
</html>
