<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Maze Debug Version</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #lobby { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #001; display: flex; align-items: center; justify-content: center; z-index: 100; color: #0f0; }
        #ui { position: absolute; top: 10px; left: 10px; color: #0f0; z-index: 10; background: rgba(0,0,0,0.5); padding: 10px; border: 1px solid #0f0; }
        canvas { display: block; }
        #minimap { position: absolute; bottom: 10px; right: 10px; width: 120px; height: 120px; border: 2px solid #0f0; z-index: 20; background: #000; }
    </style>
</head>
<body>
    <canvas id="minimap"></canvas>
    <div id="lobby">
        <div style="border: 1px solid #0f0; padding: 20px;">
            <input type="text" id="code" placeholder="ROOM CODE" style="background:#000; color:#0f0; border:1px solid #0f0; padding:10px;">
            <button onclick="start(true)">HOST</button>
            <button onclick="start(false)">JOIN</button>
        </div>
    </div>
    <div id="ui">Игроков: <span id="pc">1</span> | ID: <span id="myid">...</span></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/PointerLockControls.js"></script>

    <script>
        let scene, camera, renderer, controls, peer, conn;
        let otherPlayer = null;
        let keys = {};
        let moveTarget = { x: 0, z: 0 };

        function start(isHost) {
            const room = document.getElementById('code').value;
            if(!room) return alert("Код!");
            document.getElementById('lobby').style.display = 'none';
            
            const myId = isHost ? room : "g_" + Math.random().toString(36).substr(2,4);
            document.getElementById('myid').innerText = myId;

            peer = new Peer(myId, { debug: 2 });

            peer.on('open', () => {
                if(!isHost) {
                    conn = peer.connect(room);
                    initConn();
                }
            });

            peer.on('connection', (c) => {
                conn = c;
                initConn();
            });

            initScene();
        }

        function initConn() {
            conn.on('open', () => {
                document.getElementById('pc').innerText = "2";
                // Пинг каждые 100мс, чтобы не давать вкладке "уснуть"
                setInterval(() => {
                    if(conn.open) conn.send({x: camera.position.x, z: camera.position.z});
                }, 100);
            });

            conn.on('data', (data) => {
                moveTarget = data;
                if(!otherPlayer) {
                    // Используем КУБ вместо капсулы (он надежнее)
                    const geo = new THREE.BoxGeometry(0.3, 0.3, 0.3);
                    const mat = new THREE.MeshBasicMaterial({color: 0xff0000});
                    otherPlayer = new THREE.Mesh(geo, mat);
                    scene.add(otherPlayer);
                }
            });
        }

        function initScene() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            controls = new THREE.PointerLockControls(camera, document.body);
            document.body.addEventListener('click', () => controls.lock());

            // Пол
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), new THREE.MeshBasicMaterial({color: 0x111111}));
            floor.rotation.x = -Math.PI/2;
            scene.add(floor);

            camera.position.y = 1.5;
            camera.position.z = 5;

            window.addEventListener('keydown', (e) => keys[e.code] = true);
            window.addEventListener('keyup', (e) => keys[e.code] = false);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(controls.isLocked) {
                if(keys['KeyW']) controls.moveForward(0.1);
                if(keys['KeyS']) controls.moveForward(-0.1);
                if(keys['KeyA']) controls.moveRight(-0.1);
                if(keys['KeyD']) controls.moveRight(0.1);
            }

            if(otherPlayer) {
                otherPlayer.position.x = moveTarget.x;
                otherPlayer.position.z = moveTarget.z;
                otherPlayer.position.y = 1.5;
            }

            renderer.render(scene, camera);
            
            // Простая отрисовка мини-карты
            const ctx = document.getElementById('minimap').getContext('2d');
            ctx.clearRect(0,0,120,120);
            ctx.fillStyle = "white";
            ctx.fillRect(60 + camera.position.x*5, 60 + camera.position.z*5, 4, 4);
            if(otherPlayer) {
                ctx.fillStyle = "red";
                ctx.fillRect(60 + moveTarget.x*5, 60 + moveTarget.z*5, 4, 4);
            }
        }
    </script>
</body>
</html>
