<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Maze Fix - Numbers Only</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; color: #0f0; }
        #lobby { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 100; }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 10px; border: 1px solid #0f0; z-index: 10; }
        .menu { border: 1px solid #0f0; padding: 20px; text-align: center; }
        input { background: #000; color: #0f0; border: 1px solid #0f0; padding: 10px; margin: 10px; width: 200px; }
        button { padding: 10px 20px; background: #0f0; color: #000; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="lobby">
        <div class="menu">
            <h2>MAZE CONNECT</h2>
            <input type="text" id="room" placeholder="КОД КОМНАТЫ"><br>
            <button onclick="start(true)">HOST</button>
            <button onclick="start(false)">JOIN</button>
        </div>
    </div>
    <div id="ui">
        ИГРОКОВ: <span id="pc">1</span> | 
        ПАКЕТЫ: <span id="pkts">0</span><br>
        ТВОИ: <span id="myPos">0, 0</span><br>
        ЧУЖИЕ: <span id="othPos">нет данных</span>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/PointerLockControls.js"></script>

    <script>
        let scene, camera, renderer, controls, peer, conn;
        let remoteMesh = null;
        let keys = {};
        let pCount = 0;

        function start(isHost) {
            const code = document.getElementById('room').value.trim();
            if(!code) return alert("Нужен код!");
            document.getElementById('lobby').style.display = 'none';

            // Создаем соединение
            peer = new Peer(isHost ? code : "cl_" + Math.floor(Math.random()*999));

            peer.on('open', () => {
                if(!isHost) {
                    conn = peer.connect(code);
                    setupNetwork();
                }
            });

            peer.on('connection', (c) => {
                conn = c;
                setupNetwork();
            });

            initGame();
        }

        function setupNetwork() {
            conn.on('open', () => {
                document.getElementById('pc').innerText = "2";
                
                // Отправляем ТОЛЬКО числа, чтобы не было ошибок
                setInterval(() => {
                    if(conn && conn.open) {
                        conn.send({
                            x: Number(camera.position.x),
                            z: Number(camera.position.z)
                        });
                    }
                }, 50);
            });

            conn.on('data', (data) => {
                pCount++;
                document.getElementById('pkts').innerText = pCount;
                document.getElementById('othPos').innerText = Math.round(data.x) + ", " + Math.round(data.z);

                if(!remoteMesh) {
                    // Создаем яркий красный куб
                    const geo = new THREE.BoxGeometry(0.6, 0.6, 0.6);
                    const mat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
                    remoteMesh = new THREE.Mesh(geo, mat);
                    scene.add(remoteMesh);
                }
                
                // Принудительно обновляем позицию
                remoteMesh.position.set(data.x, 0.5, data.z);
            });
        }

        function initGame() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            controls = new THREE.PointerLockControls(camera, document.body);
            document.body.addEventListener('click', () => controls.lock());

            // Сетка, чтобы видеть движение
            const grid = new THREE.GridHelper(100, 50, 0x00ff00, 0x222222);
            scene.add(grid);

            // Начальная позиция
            camera.position.set(0, 1.6, 5);

            window.onkeydown = (e) => keys[e.code] = true;
            window.onkeyup = (e) => keys[e.code] = false;

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(controls.isLocked) {
                if(keys['KeyW']) controls.moveForward(0.1);
                if(keys['KeyS']) controls.moveForward(-0.1);
                if(keys['KeyA']) controls.moveRight(-0.1);
                if(keys['KeyD']) controls.moveRight(0.1);
            }
            
            document.getElementById('myPos').innerText = Math.round(camera.position.x) + ", " + Math.round(camera.position.z);
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
