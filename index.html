<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Maze Free Connect</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: #0f0; font-family: sans-serif; }
        #lobby { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 100; }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,20,0,0.8); padding: 10px; border: 1px solid #0f0; font-size: 12px; }
        .menu { border: 1px solid #0f0; padding: 20px; text-align: center; }
        input { background: #000; color: #0f0; border: 1px solid #0f0; padding: 10px; margin: 10px; width: 180px; }
        button { padding: 10px 20px; background: #0f0; color: #000; border: none; cursor: pointer; font-weight: bold; }
        .ok { color: #0f0; } .err { color: #f00; }
    </style>
</head>
<body>

    <div id="lobby">
        <div class="menu">
            <h2>MAZE FREE NET</h2>
            <input type="text" id="room" placeholder="ЛЮБОЙ КОД">
            <br>
            <button onclick="connect(true)">Я - ХОСТ</button>
            <button onclick="connect(false)">Я - ГОСТЬ</button>
        </div>
    </div>

    <div id="ui">
        СВЯЗЬ: <span id="status">...</span> | ПАКЕТЫ: <span id="pkts">0</span>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/PointerLockControls.js"></script>

    <script>
        let scene, camera, renderer, controls, peer, conn, remotePlayer;
        let pCount = 0;

        function connect(isHost) {
            const code = document.getElementById('room').value;
            if(!code) return alert("Введи код!");
            document.getElementById('lobby').style.display = 'none';

            // ЭТО ГЛАВНОЕ: Список бесплатных серверов-помощников от Google и Mozilla
            const config = {
                'iceServers': [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' },
                    { urls: 'stun:stun.services.mozilla.com' }
                ]
            };

            // Создаем уникальные ID для каждой роли
            const myId = isHost ? "room_" + code : "cli_" + Math.random().toString(36).substr(2, 5);
            peer = new Peer(myId, { config: config });

            peer.on('open', () => {
                document.getElementById('status').innerText = isHost ? "ЖДУ ИГРОКА" : "ИЩУ ХОСТ...";
                if(!isHost) {
                    const c = peer.connect("room_" + code, { reliable: true });
                    setup(c);
                }
            });

            peer.on('connection', (c) => setup(c));
            peer.on('error', (e) => {
                document.getElementById('status').innerText = "ОШИБКА";
                console.error(e);
            });

            init3D();
        }

        function setup(c) {
            conn = c;
            conn.on('open', () => {
                document.getElementById('status').innerText = "ЕСТЬ КОНТАКТ!";
                document.getElementById('status').className = "ok";
                
                setInterval(() => {
                    if(conn.open) conn.send({ x: camera.position.x, z: camera.position.z });
                }, 50);
            });

            conn.on('data', (data) => {
                pCount++;
                document.getElementById('pkts').innerText = pCount;
                if(!remotePlayer) {
                    remotePlayer = new THREE.Mesh(
                        new THREE.BoxGeometry(0.8, 0.8, 0.8),
                        new THREE.MeshBasicMaterial({ color: 0xff0000 })
                    );
                    scene.add(remotePlayer);
                }
                remotePlayer.position.set(data.x, 0.4, data.z);
            });
        }

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            controls = new THREE.PointerLockControls(camera, document.body);
            document.body.addEventListener('click', () => controls.lock());
            scene.add(new THREE.GridHelper(100, 50, 0x00ff00, 0x111111));
            camera.position.set(0, 1.6, 5);
            const keys = {};
            window.onkeydown = (e) => keys[e.code] = true;
            window.onkeyup = (e) => keys[e.code] = false;
            function loop() {
                requestAnimationFrame(loop);
                if(controls.isLocked) {
                    if(keys['KeyW']) controls.moveForward(0.1);
                    if(keys['KeyS']) controls.moveForward(-0.1);
                    if(keys['KeyA']) controls.moveRight(-0.1);
                    if(keys['KeyD']) controls.moveRight(0.1);
                }
                renderer.render(scene, camera);
            }
            loop();
        }
    </script>
</body>
</html>
